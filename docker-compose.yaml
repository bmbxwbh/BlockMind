version: '3.8'

services:
  blockmind:
    build: .
    container_name: blockmind-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./config/config.example.yaml:/app/config.yaml
      - blockmind-data:/data
      - ./skills:/app/skills
    environment:
      - PYTHONPATH=/app
      - BLOCKMIND_CONFIG=/app/config.yaml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # 可选：Minecraft 服务器（如果需要在同一机器运行）
  # mc-server:
  #   image: itzg/minecraft-server:java17
  #   container_name: mc-server
