services:
  blockmind:
    image: ghcr.io/bmbxwbh/blockmind:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blockmind
    restart: unless-stopped
    ports:
      - "${BLOCKMIND_PORT:-19951}:19951"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - blockmind-data:/data
      - ./skills:/app/skills:ro
    environment:
      - PYTHONPATH=/app
      - BLOCKMIND_CONFIG=/app/config.yaml
      - BLOCKMIND_PORT=19951
      - BLOCKMIND_PASSWORD=${BLOCKMIND_PASSWORD:-}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:19951/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

volumes:
  blockmind-data:
