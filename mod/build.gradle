import java.lang.reflect.Method

// ── 版本参数化 ──
def mcVersion = project.findProperty('mcVersion') ?: '26.1.2'

// 版本映射表
def versionMap = [
    // ── MC 1.20.x ── (yarn, Java 17, loom 1.6)
    '1.20.0': [yarn: '1.20+build.1:v2',       fabricApi: '0.87.0+1.20',    loader: '0.15.3',  loom: '1.6-SNAPSHOT', java: 17],
    '1.20.1': [yarn: '1.20.1+build.10:v2',     fabricApi: '0.89.3+1.20.1',  loader: '0.15.3',  loom: '1.6-SNAPSHOT', java: 17],
    '1.20.2': [yarn: '1.20.2+build.4:v2',      fabricApi: '0.91.0+1.20.2',  loader: '0.15.3',  loom: '1.6-SNAPSHOT', java: 17],
    '1.20.3': [yarn: '1.20.3+build.1:v2',      fabricApi: '0.91.6+1.20.3',  loader: '0.15.3',  loom: '1.6-SNAPSHOT', java: 17],
    '1.20.4': [yarn: '1.20.4+build.3:v2',      fabricApi: '0.92.0+1.20.4',  loader: '0.15.3',  loom: '1.6-SNAPSHOT', java: 17],
    '1.20.6': [yarn: '1.20.6+build.1:v2',      fabricApi: '0.97.8+1.20.6',  loader: '0.15.11', loom: '1.7-SNAPSHOT', java: 21],

    // ── MC 1.21.x ── (yarn, Java 21, loom 1.7-1.8)
    '1.21':   [yarn: '1.21+build.9:v2',        fabricApi: '0.100.4+1.21',   loader: '0.15.11', loom: '1.7-SNAPSHOT', java: 21],
    '1.21.1': [yarn: '1.21.1+build.3:v2',      fabricApi: '0.102.0+1.21.1', loader: '0.16.0',  loom: '1.7-SNAPSHOT', java: 21],
    '1.21.2': [yarn: '1.21.2+build.1:v2',      fabricApi: '0.106.1+1.21.2', loader: '0.16.9',  loom: '1.8-SNAPSHOT', java: 21],
    '1.21.3': [yarn: '1.21.3+build.1:v2',      fabricApi: '0.107.0+1.21.3', loader: '0.16.9',  loom: '1.8-SNAPSHOT', java: 21],
    '1.21.4': [yarn: '1.21.4+build.8:v2',      fabricApi: '0.111.2+1.21.4', loader: '0.16.9',  loom: '1.8-SNAPSHOT', java: 21],

    // ── MC 26.x ── (无 yarn, Java 25, loom 1.15.5)
    '26.1':   [yarn: null,                      fabricApi: '0.145.1+26.1',   loader: '0.18.4',  loom: '1.15.5',       java: 25],
    '26.1.1': [yarn: null,                      fabricApi: '0.145.4+26.1.1', loader: '0.19.2',  loom: '1.15.5',       java: 25],
    '26.1.2': [yarn: null,                      fabricApi: '0.147.0+26.1.2', loader: '0.19.2',  loom: '1.15.5',       java: 25],
]

def versionInfo = versionMap[mcVersion]
if (versionInfo == null) {
    throw new GradleException("Unsupported MC version: ${mcVersion}. Supported: ${versionMap.keySet().sort().join(', ')}")
}

// ── 动态加载正确版本的 Loom ──
// 不同 MC 版本需要不同 loom 版本，不能在 plugins 块硬编码
buildscript {
    repositories {
        maven { url 'https://maven.fabricmc.net/' }
        gradlePluginPortal()
        mavenCentral()
    }
    dependencies {
        classpath "net.fabricmc:fabric-loom:${versionInfo.loom}"
    }
}

apply plugin: 'fabric-loom'
apply plugin: 'java'

version = "1.2.0"
group = "blockmind"

base {
    archivesName = "blockmind-mod-${mcVersion}"
}

repositories {
    mavenCentral()
    maven { url 'https://jitpack.io' }
    maven { url 'https://maven.fabricmc.net/' }
}

// ── 版本分源码 ──
if (mcVersion.startsWith('26')) {
    sourceSets.main.java.srcDir 'src/v26/java'
} else if (mcVersion.startsWith('1.21')) {
    sourceSets.main.java.srcDir 'src/v1_21/java'
} else {
    sourceSets.main.java.srcDir 'src/v1_20/java'
}

dependencies {
    minecraft "com.mojang:minecraft:${mcVersion}"

    // 仅 1.x 版本使用 yarn mappings；26.x 使用 intermediary 直接映射
    if (versionInfo.yarn != null) {
        mappings "net.fabricmc:yarn:${versionInfo.yarn}"
    }

    modImplementation "net.fabricmc.fabric-api:fabric-api:${versionInfo.fabricApi}"
    modImplementation "net.fabricmc:fabric-loader:${versionInfo.loader}"
}

// Java 版本随 MC 版本变化
def javaVer = versionInfo.java ?: 17
java {
    sourceCompatibility = JavaVersion.toVersion(javaVer)
    targetCompatibility = JavaVersion.toVersion(javaVer)
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = "UTF-8"
}

jar {
    from("LICENSE") {
        rename { "${it}_${base.archivesName.get()}" }
    }
    manifest {
        attributes(
            "Implementation-Version": project.version,
            "Minecraft-Version": mcVersion,
            "Fabric-API": versionInfo.fabricApi,
        )
    }
}

// ── 多版本批量构建 ──
task buildAllVersions {
    group = "build"
    description = "构建所有支持的 MC 版本 JAR"
    dependsOn = versionMap.keySet().collect { v ->
        tasks.register("build_${v.replace('.', '_')}") {
            doLast {
                exec {
                    commandLine "./gradlew", "build", "-PmcVersion=${v}", "--no-daemon"
                }
            }
        }
    }
}

// ── 版本信息输出 ──
task printVersionInfo {
    doLast {
        println "═══════════════════════════════════════"
        println "  BlockMind Mod — Version Info"
        println "═══════════════════════════════════════"
        println "  Target MC:   ${mcVersion}"
        println "  Yarn:        ${versionInfo.yarn ?: '(none — intermediary direct)'}"
        println "  Fabric API:  ${versionInfo.fabricApi}"
        println "  Loader:      ${versionInfo.loader}"
        println "  Loom:        ${versionInfo.loom}"
        println "  Java:        ${versionInfo.java ?: 17}"
        println "  Mod Version: ${project.version}"
        println "  Output JAR:  blockmind-mod-${mcVersion}.jar"
        println "═══════════════════════════════════════"
    }
}
