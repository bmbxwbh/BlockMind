name: Build & Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# ── 全局取消同分支旧构建 ──
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ══════════════════════════════════════
  # 1. 构建 Fabric Mod（多版本矩阵）
  # ══════════════════════════════════════
  build-mod:
    name: 🔧 Mod ${{ matrix.mc-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mc-version:
          # ── 1.20.x ──
          - '1.20.0'
          - '1.20.1'
          - '1.20.2'
          - '1.20.3'
          - '1.20.4'
          - '1.20.6'
          # ── 1.21.x ──
          - '1.21'
          - '1.21.1'
          - '1.21.2'
          - '1.21.3'
          - '1.21.4'
          # ── 26.x ──
          - '26.1'
          - '26.1.1'
          - '26.1.2'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ startsWith(matrix.mc-version, '26') && '25' || '17' }}
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build Mod
        working-directory: mod
        run: ./gradlew build --no-daemon -PmcVersion=${{ matrix.mc-version }}

      - name: Upload Mod JAR
        uses: actions/upload-artifact@v4
        with:
          name: blockmind-mod-${{ matrix.mc-version }}
          path: mod/build/libs/blockmind-mod-*.jar
          retention-days: 30

  # ══════════════════════════════════════
  # 2. Python 测试
  # ══════════════════════════════════════
  test-python:
    name: 🧪 Python Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  # ══════════════════════════════════════
  # 3. 构建并推送 Docker 镜像
  # ══════════════════════════════════════
  build-docker:
    name: 🐳 Docker Image
    runs-on: ubuntu-latest
    needs: [build-mod, test-python]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Mod JARs
        uses: actions/download-artifact@v4
        with:
          pattern: blockmind-mod-*
          merge-multiple: true
          path: mod/build/libs/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: |
          echo "## 🐳 Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | Digest |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`latest\` | \`${{ steps.meta.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY

  # ══════════════════════════════════════
  # 4. 发布到 GitHub Releases
  # ══════════════════════════════════════
  release:
    name: 🚀 Release
    runs-on: ubuntu-latest
    needs: [build-mod, build-docker]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Mod JARs
        uses: actions/download-artifact@v4
        with:
          pattern: blockmind-mod-*
          merge-multiple: true
          path: release/

      - name: List release files
        run: |
          echo "## 📦 Release Artifacts" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh release/ >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Generate changelog
        id: changelog
        run: |
          # 获取上一个 tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" HEAD~10..HEAD)
          fi
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/blockmind-mod-*.jar
          body: |
            ## 🧠 BlockMind ${{ github.ref_name }}

            ### 📦 Mod JARs
            选择与你的 Minecraft 服务器版本匹配的 JAR 放入 `mods/` 目录。

            **MC 1.20.x：**
            | 文件 | 说明 |
            |------|------|
            | `blockmind-mod-1.20.0.jar` | MC 1.20.0 |
            | `blockmind-mod-1.20.1.jar` | MC 1.20.1 |
            | `blockmind-mod-1.20.2.jar` | MC 1.20.2 |
            | `blockmind-mod-1.20.3.jar` | MC 1.20.3 |
            | `blockmind-mod-1.20.4.jar` | MC 1.20.4 |
            | `blockmind-mod-1.20.6.jar` | MC 1.20.6 |

            **MC 1.21.x：**
            | 文件 | 说明 |
            |------|------|
            | `blockmind-mod-1.21.jar` | MC 1.21 |
            | `blockmind-mod-1.21.1.jar` | MC 1.21.1 |
            | `blockmind-mod-1.21.2.jar` | MC 1.21.2 |
            | `blockmind-mod-1.21.3.jar` | MC 1.21.3 |
            | `blockmind-mod-1.21.4.jar` | MC 1.21.4 |

            **MC 26.x（最新）：**
            | 文件 | 说明 |
            |------|------|
            | `blockmind-mod-26.1.jar` | MC 26.1 |
            | `blockmind-mod-26.1.1.jar` | MC 26.1.1 |
            | `blockmind-mod-26.1.2.jar` | MC 26.1.2 |

            ### 🐳 Docker
            ```bash
            docker pull ghcr.io/bmbxwbh/blockmind:latest
            ```

            ### 📝 Changes
            ${{ steps.changelog.outputs.changes }}

            ---
            > 💡 选择与你的 Minecraft 服务器版本匹配的 JAR 放入 `mods/` 目录
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}

  # ══════════════════════════════════════
  # 5. 推送 Python 包到 PyPI（可选）
  # ══════════════════════════════════════
  publish-pypi:
    name: 📦 Publish to PyPI
    runs-on: ubuntu-latest
    needs: [test-python]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
