name: Build Mod & Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'mod/**'
      - 'src/**'
      - 'skills/**'
      - 'config/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 构建 Fabric Mod ──
  build-mod:
    name: 🔧 Build Fabric Mod
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Mod
        working-directory: mod
        run: ./gradlew build --no-daemon

      - name: Check JAR exists
        run: |
          ls -la mod/build/libs/
          test -f mod/build/libs/blockmind-mod-*.jar

      - name: Upload Mod JAR
        uses: actions/upload-artifact@v4
        with:
          name: blockmind-mod
          path: mod/build/libs/blockmind-mod-*.jar
          retention-days: 30

      - name: Upload Mod JAR (release)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: blockmind-mod-release
          path: mod/build/libs/blockmind-mod-*.jar

  # ── Python 测试 ──
  test-python:
    name: 🧪 Python Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  # ── 构建 Docker 镜像 ──
  build-docker:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: [build-mod, test-python]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Mod JAR
        uses: actions/download-artifact@v4
        with:
          name: blockmind-mod
          path: mod/build/libs/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Image pushed ${{ steps.meta.outputs.tags }}"

  # ── Release 发布 ──
  release:
    name: 🚀 Release
    runs-on: ubuntu-latest
    needs: [build-mod, build-docker]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Mod JAR
        uses: actions/download-artifact@v4
        with:
          name: blockmind-mod-release
          path: release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/blockmind-mod-*.jar
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
