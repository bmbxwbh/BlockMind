skill_id: build_glass_house
name: 建造玻璃房子
tags:
- building
- house
- glass
- 建造
- 房子
- 玻璃
priority: 5
task_level: L3
description: 在当前位置建造一个5x5玻璃房子
author: community
version: 1
market:
  category: building
  difficulty: intermediate
  mc_versions:
  - 1.20.x
  - 1.21.x
  description_long: '自动建造玻璃房子：

    - 5x5 底座

    - 3格高墙壁

    - 玻璃屋顶

    - 留门位置

    - 放置火把照明'
  license: MIT
  keywords:
  - 玻璃房子
  - 建造
  - glass_house
  rating: 4.8
  download_count: 156
when:
  all:
  - inventory.count('glass') >= 64
do:
- action: walk_to
  args:
    x: self.position.x
    y: self.position.y
    z: self.position.z
- action: loop
  args:
    while: has_blocks_to_place()
    do:
    - action: place_block
      args:
        item: glass
        position: next_build_pos()
until:
  any:
  - build_complete()
  - task_interrupted()
