skill_id: go_home
name: 回家
tags: ["回家", "回基地", "导航", "home", "navigate"]
priority: 2
task_level: L1
author: system
version: 2
description: 使用智能导航系统返回记忆中的家/基地位置

when:
  all:
    - "not self.position() near home"

do:
  - action: smart_navigate
    args:
      target: "home"
      allow_break: false
      allow_place: false
      use_cache: true

until:
  any:
    - "self.position() near home"
    - "task_interrupted()"

# 记忆增强：
# 1. 自动从记忆系统获取玩家家位置
# 2. 优先走缓存的可靠路径
# 3. 自动避开建筑保护区
# 4. 自动避开已知危险区域（岩浆等）
# 5. 到达后自动更新路径缓存
