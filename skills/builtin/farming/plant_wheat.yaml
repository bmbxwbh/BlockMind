skill_id: farm_wheat
name: 种小麦
tags: ["种田", "种小麦", "农业", "farming", "wheat"]
priority: 5
task_level: L2
author: system
version: 2
description: 前往农田播种小麦，自动寻找耕地并逐块种植

when:
  all:
    - "inventory.has('wheat_seeds')"

do:
  - action: scan_blocks
    args: {radius: 32, filter: "type == 'farmland'", sort_by: "distance"}
  - action: smart_navigate
    args:
      target: "scanned.position"
      allow_break: false
      allow_place: false
      use_cache: true
  - loop:
      while: "inventory.count('wheat_seeds') > 0"
      do:
        - action: place_block
          args: {item: "wheat_seeds", x: "scanned.position.x", y: "scanned.position.y", z: "scanned.position.z"}
        - action: wait
          args: {seconds: 0.3}

until:
  any:
    - "inventory.count('wheat_seeds') == 0"
    - "task_interrupted()"

# 记忆增强：记住农田位置，成熟后自动回来收割
