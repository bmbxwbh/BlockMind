skill_id: farm_wheat
name: 种田
tags: ["种田", "种小麦", "农业"]
priority: 5
task_level: L2

when:
  all:
    - "inventory.has('wheat_seeds')"

do:
  # 智能导航到农场（记忆中的农场位置）
  - action: smart_navigate
    args:
      target: "farm"
      allow_break: false
      use_cache: true
  - loop:
      while: "inventory.count('wheat_seeds') > 0"
      do:
        - action: place_block
          args: {item: "wheat_seeds", x: "next_farm_pos"}
        - action: wait
          args: {seconds: 0.5}

until:
  any:
    - "inventory.count('wheat_seeds') == 0"
    - "task_interrupted()"
