skill_id: chop_tree
name: 砍树
tags: ["砍树", "伐木", "收集木材"]
priority: 4
task_level: L2

when:
  all:
    - "inventory.has('wooden_axe') or inventory.has('stone_axe') or inventory.has('iron_axe')"

do:
  - action: scan_blocks
    args: {radius: 32, filter: "type == 'oak_log'", sort_by: "distance"}
  # 智能导航到树木位置（避开建筑保护区）
  - action: smart_navigate
    args:
      target: "scanned.position"
      allow_break: false                # 不破坏路上的建筑
      use_cache: true
  - loop:
      while: "world.entity_exists(scanned.id)"
      do:
        - action: dig_block
          args: {x: "scanned.position.x", y: "scanned.position.y", z: "scanned.position.z"}
        - action: wait
          args: {seconds: 1}

until:
  any:
    - "inventory.count('oak_log') >= 64"
    - "task_interrupted()"

# 记忆增强：
# 1. 自动避开建筑保护区
# 2. 如果树木在保护区内，跳过该树木
# 3. 缓存从基地到树林的路径
