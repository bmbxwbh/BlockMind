skill_id: fish
name: 钓鱼
tags: ["钓鱼", "捕鱼"]
priority: 5
task_level: L2

when:
  all:
    - "inventory.has('fishing_rod')"

do:
  # 智能导航到已知水域（记忆系统）
  - action: smart_navigate
    args:
      target: "water_point"             # 记忆中的水域位置
      allow_break: false
      use_cache: true
  - action: look_at
    args: {x: "water_x", y: "water_y", z: "water_z"}
  - action: wait
    args: {seconds: 30}

until:
  any:
    - "inventory.count('raw_cod') >= 16"
    - "task_interrupted()"
