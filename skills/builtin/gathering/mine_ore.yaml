skill_id: mine_ore
name: 挖矿
tags: ["挖矿", "采矿", "开矿", "mining", "ore"]
priority: 4
task_level: L2
author: system
version: 2
description: 扫描附近矿脉并智能导航挖掘，自动避开危险区域

when:
  all:
    - "inventory.has('iron_pickaxe') or inventory.has('diamond_pickaxe') or inventory.has('stone_pickaxe')"

do:
  - action: scan_blocks
    args: {radius: 32, filter: "type contains 'ore'", sort_by: "distance"}
  - action: smart_navigate
    args:
      target: "scanned.position"
      allow_break: true
      allow_place: false
      use_cache: true
  - action: dig_block
    args: {x: "scanned.position.x", y: "scanned.position.y", z: "scanned.position.z"}

until:
  any:
    - "inventory.count('iron_ore') >= 32"
    - "inventory.count('diamond') >= 5"
    - "inventory.is_full()"
    - "task_interrupted()"

# 记忆增强：成功挖到矿石的路径会被缓存，危险区域（岩浆/深坑）加入黑名单
