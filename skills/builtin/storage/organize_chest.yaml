skill_id: organize_chest
name: 整理箱子
tags: ["整理箱子", "整理仓库"]
priority: 4
task_level: L1

when:
  all:
    - "self.position() near home"

do:
  # 智能导航到箱子位置
  - action: smart_navigate
    args:
      target: "chest"
      allow_break: false
      use_cache: true

until:
  any:
    - "task_interrupted()"
