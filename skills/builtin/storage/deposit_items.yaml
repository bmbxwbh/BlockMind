skill_id: deposit_items
name: 存放物品
tags: ["存东西", "存放物品", "仓库", "deposit", "storage"]
priority: 3
task_level: L1
author: system
version: 2
description: 将背包中的矿物和建材存入家附近的箱子

when:
  all:
    - "inventory.used_slots() > 20"

do:
  - action: smart_navigate
    args:
      target: "home"
      allow_break: false
      allow_place: false
      use_cache: true
  - action: scan_blocks
    args: {radius: 8, filter: "type == 'chest'", sort_by: "distance"}
  - action: smart_navigate
    args:
      target: "scanned.position"
      allow_break: false
      allow_place: false
      use_cache: false
  - action: interact_block
    args: {target: "chest"}
  - action: deposit_items
    args:
      items: ["cobblestone", "dirt", "gravel", "andesite", "diorite", "granite"]
      count: "all"

until:
  any:
    - "inventory.used_slots() <= 10"
    - "task_interrupted()"

# 记忆增强：记住箱子位置和存放偏好
