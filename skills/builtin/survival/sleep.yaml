skill_id: sleep
name: 睡觉
tags: ["睡觉", "睡一觉", "生存", "sleep", "bed"]
priority: 2
task_level: L1
author: system
version: 2
description: 夜晚自动导航到床的位置睡觉跳过黑夜

when:
  all:
    - "world.time() > 13000"
    - "not world.any_entity(type='monster', radius=16)"

do:
  - action: smart_navigate
    args:
      target: "bed"
      allow_break: false
      allow_place: false
      use_cache: true
  - action: interact_block
    args: {target: "bed"}
  - action: wait
    args: {seconds: 10}

until:
  any:
    - "world.time() < 1000"
    - "task_interrupted()"

# 记忆增强：记住床的位置，如果被炸了会寻找新床
