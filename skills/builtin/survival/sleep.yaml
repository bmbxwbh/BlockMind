skill_id: sleep
name: 睡觉
tags: ["睡觉", "睡一觉", "生存"]
priority: 2
task_level: L1

when:
  all:
    - "world.time() > 13000"
    - "not world.any_entity(type='monster', radius=16)"

do:
  # 智能导航到床的位置（从记忆中获取）
  - action: smart_navigate
    args:
      target: "bed"                     # 记忆系统中的床位置
      allow_break: false
      use_cache: true
  - action: wait
    args: {seconds: 5}

until:
  any:
    - "world.time() < 1000"
    - "task_interrupted()"
