game:
  server_ip: localhost
  server_port: 25565
  username: BlockMind
  version: 1.20.4
  auth_mode: offline
  reconnect:
    enabled: true
    interval: 5
    max_retries: 10

mod:
  host: localhost
  port: 25580
  timeout: 10.0
  no_mod_mode: false
  expected_version: "1.0.0"
  ws_backoff:
    initial_backoff: 2.0
    max_backoff: 120.0
    backoff_multiplier: 2.0
ai:
  main_agent:
    provider: openai
    api_key: your-api-key-here
    model: gpt-5.4-mini
    base_url: 'http://38.246.244.201:8317/v1'
    temperature: 0.7
    max_tokens: 512
  operation_agent:
    provider: openai
    api_key: your-api-key-here
    model: gpt-5.4-mini
    base_url: 'http://38.246.244.201:8317/v1'
    temperature: 0.3
    max_tokens: 4096
skills:
  storage_path: ./skills
  validation:
    syntax_check: true
    safety_check: true
    logic_check: true
    max_retries: 3
  auto_repair:
    enabled: true
    max_attempts: 3
  versioning:
    max_versions: 10
safety:
  audit_log:
    retention_days: 30
  authorization:
    timeout: 30
    timeout_action: deny
  emergency_takeover:
    enabled: true
  risk_levels: {}
monitoring:
  health_check:
    interval: 10
  fallback:
    retry_count: 3
    safe_point: "0,64,0"
  alert:
    chat_notify: true
    log_level: INFO
idle_tasks:
  enabled: true
  interval: 30
  actions:
  - name: 自动种田
    enabled: true
    priority: 5
  - name: 自主挖矿
    enabled: true
    priority: 5
  - name: 自主砍树
    enabled: true
    priority: 5
  - name: 整理箱子
    enabled: true
    priority: 5
  - name: 修补房屋
    enabled: false
    priority: 4
  - name: 点亮区域
    enabled: true
    priority: 4
  - name: 巡逻区域
    enabled: false
    priority: 5
webui:
  enabled: true
  host: 0.0.0.0
  port: 19951
  auth:
    password: blockmind
    session_timeout: 3600
  security:
    allow_remote: false
    allowed_ips:
    - 127.0.0.1
    enable_https: false
  websocket:
    ping_interval: 30
logging:
  level: INFO
  file: logs/blockmind.log
  max_size: "10MB"
  backup_count: 5
  format: '%(asctime)s [%(name)s] %(levelname)s: %(message)s'
memory:
  enabled: true
  storage_path: data/memory
  auto_detect_zones: true         # 自动检测建筑/危险/资源区域
  auto_detect_radius: 32
  max_cached_paths: 500
  max_strategies: 200
  path_success_threshold: 0.8    # 路径成功率 > 80% 才复用
  strategy_success_threshold: 0.6
  protect_buildings: true         # 自动保护玩家建筑

navigation:
  prefer_baritone: true           # 优先 Baritone 高级寻路
  fallback_to_basic: true         # 不可用时回退到基础 A*
  allow_break_default: false      # 默认不破坏方块
  allow_place_default: false      # 默认不放置方块
  sprint_default: false
  max_path_length: 200

ops:
  process:
    pid_file: /tmp/blockmind.pid
    daemon: false
  limits:
    max_memory: 2048
    max_cpu_percent: 80